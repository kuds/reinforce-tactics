# Behavior-cloning warm-start: ability-focused scenario mix.
# All scenarios must share the same map dimensions; DemonstrationDataset
# stacks observations into a single tensor.
scenarios:
  - name: all_units
    map_file: maps/1v1/crossroads.csv
    enabled_units: null
    demonstrator: advanced
    opponent: medium
    n_episodes: 20
    max_turns: 200
    weight: 1.0

  - name: sorcerer_buffs
    map_file: maps/1v1/crossroads.csv
    enabled_units: ["W", "S"]
    demonstrator: advanced
    opponent: medium
    n_episodes: 30
    max_turns: 200
    weight: 1.5

  - name: cleric_heals
    map_file: maps/1v1/crossroads.csv
    enabled_units: ["W", "A", "C"]
    demonstrator: advanced
    opponent: medium
    n_episodes: 30
    max_turns: 200
    weight: 1.5

  - name: mage_paralyze
    map_file: maps/1v1/crossroads.csv
    enabled_units: ["W", "M"]
    demonstrator: advanced
    opponent: medium
    n_episodes: 30
    max_turns: 200
    weight: 1.5
