# Auto-generated by scripts/generate_bootstrap_sweep.py
# Variation: v09_low_start_007_to_003_linear
#
# Every currently-scheduled stage anneals linear 0.07 -> 0.03. Tests whether
# the 0.10 start was overshooting on warm-started stages.
#
# Sweep dimension: entropy schedule (per-stage ent_coef). Every other field is
# identical to configs/ppo/bootstrap.yaml so result deltas can be attributed
# cleanly to the entropy change.

algorithm: maskable_ppo
seed: 42
total_timesteps: 22000000
env:
  n_envs: 8
  use_subprocess: true
  max_steps: 3000
  max_turns: 20
  action_space_type: flat_discrete
  reward_config:
    win_by_hq_capture: 50.0
    win_by_elimination: 50.0
    win: 50.0
    loss: -50.0
    draw: -50.0
    income_diff: 0.05
    unit_diff: 0.3
    structure_control: 1.0
    create_unit: 0.0
    move: 0.0
    damage_scale: 0.0
    kill: 0.0
    seize_progress: 3.0
    capture: 10.0
    tower_capture: 15.0
    building_capture: 40.0
    hq_capture: 25.0
    cure: 0.0
    heal_scale: 0.0
    paralyze: 0.0
    haste: 0.0
    defence_buff: 0.0
    attack_buff: 0.0
    invalid_action: -0.1
    turn_penalty: 0.0
    win_speed_bonus: 50.0
    enemy_neutral_capture: -8.0
    enemy_owned_capture: -15.0
ppo:
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 256
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.05
  vf_coef: 0.5
  max_grad_norm: 0.5
  policy_kwargs:
    net_arch:
      pi:
      - 256
      - 256
      vf:
      - 256
      - 256
    features_extractor_class: reinforcetactics.rl.extractors.SpatialFeatureExtractor
    features_extractor_kwargs:
      features_dim: 256
      pool: avg
eval:
  eval_freq: 50000
  n_eval_episodes: 80
