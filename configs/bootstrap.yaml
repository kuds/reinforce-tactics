# PPO bootstrap curriculum.
#
# Loaded by reinforcetactics.rl.config.load_config into a TrainingConfig.
# Stages live under curriculum.stages; if a stage exhausts its
# `max_timesteps` without promoting, the runner raises CurriculumStalled.
algorithm: maskable_ppo
seed: 42
total_timesteps: 14_000_000  # informational; per-stage budgets drive run length

env:
  n_envs: 4
  max_steps: 400
  max_turns: 20
  enabled_units: [W, M, A]
  action_space_type: flat_discrete
  reward_config:
    win_by_hq_capture: 5000.0
    win_by_elimination: 1000.0
    win: 5000.0
    loss: -5000.0
    draw: -5000.0
    income_diff: 0.5
    unit_diff: 1.0
    structure_control: 10.0
    create_unit: 0.0
    move: 0.0
    damage_scale: 0.0
    kill: 0.0
    seize_progress: 300.0
    capture: 1000.0          # back-compat fallback (no longer reached
                             # when the per-type keys below are set)
    # Per-structure capture differentiation. Hoisted to the global env
    # config (rather than scoped to a single late stage) so every stage
    # in the curriculum sees the same gradient: building captures are
    # the highest per-turn payoff, HQ captures are a viable finisher,
    # and neutral towers are positive-but-not-dominant. Rationale:
    # introducing a new strategy mid-curriculum (only at random_20)
    # asks the policy to discover and integrate it after entropy has
    # already cooled to 0.03 and the value function has locked in on
    # the warrior-spam-elimination attractor from earlier stages. Far
    # easier to bake in the correct inductive bias from stage 1, when
    # entropy is high and the value function is plastic. Both starter
    # and beginner maps have HQs, buildings, and towers in equivalent
    # layouts, so the gradient is meaningful on every stage.
    tower_capture: 1500.0    # neutral towers; modest downweight on the
                             # local optimum the prior run converged to
    building_capture: 4000.0 # enemy economy; ~2050/turn vs tower 800/turn
                             # makes this the per-turn-best capture target
    hq_capture: 2500.0       # stacks with win_by_hq_capture (+5000) so
                             # HQ seize pays ~1875/turn including terminal
    cure: 0.0
    heal_scale: 0.0
    paralyze: 0.0
    haste: 0.0
    defence_buff: 0.0
    attack_buff: 0.0
    invalid_action: -10.0
    turn_penalty: -20.0

ppo:
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.05
  vf_coef: 0.5
  max_grad_norm: 0.5
  policy_kwargs:
    net_arch:
      pi: [256, 256]
      vf: [256, 256]

eval:
  eval_freq: 50_000

curriculum:
  stages:
    - name: starter_random
      map_file: maps/1v1/starter.csv
      opponent: random
      promotion_win_rate: 0.90
      patience: 1
      max_timesteps: 1_000_000
      n_eval_episodes: 60

    - name: starter_simple
      map_file: maps/1v1/starter.csv
      opponent: simple
      promotion_win_rate: 0.90
      patience: 1
      max_timesteps: 2_000_000
      n_eval_episodes: 60

    - name: starter_medium
      map_file: maps/1v1/starter.csv
      opponent: medium
      promotion_win_rate: 0.75
      patience: 1
      max_timesteps: 3_000_000
      n_eval_episodes: 60

    - name: beginner_balanced_random
      map_file: maps/1v1/beginner.csv
      opponent: balanced_random
      promotion_win_rate: 0.85
      patience: 2
      max_timesteps: 1_500_000
      n_eval_episodes: 60
      max_steps: 1500
      max_turns: 100
      ent_coef:
        start: 0.10
        end: 0.03
        schedule: linear
      reward_config:
        win_by_hq_capture: 3000.0
        win_by_elimination: 3000.0
        seize_progress: 50.0
        capture: 2000.0

    - name: beginner_random_10
      map_file: maps/1v1/beginner.csv
      opponent: random
      opponent_kwargs:
        max_actions: 10
      promotion_win_rate: 0.75
      patience: 2
      max_timesteps: 1_500_000
      n_eval_episodes: 60
      max_steps: 1500
      max_turns: 100
      ent_coef:
        start: 0.10
        end: 0.03
        schedule: linear
      reward_config:
        win_by_hq_capture: 3000.0
        win_by_elimination: 3000.0
        seize_progress: 50.0
        capture: 2000.0

    - name: beginner_random_20
      map_file: maps/1v1/beginner.csv
      opponent: random
      opponent_kwargs:
        max_actions: 20
      promotion_win_rate: 0.75
      patience: 2
      max_timesteps: 2_000_000
      n_eval_episodes: 60
      max_steps: 1500
      max_turns: 100
      ent_coef:
        start: 0.10
        end: 0.03
        schedule: linear
      # Per-type capture weights (tower_capture / building_capture /
      # hq_capture) are inherited from the global env.reward_config so
      # the building-attack inductive bias is established in earlier
      # stages (when entropy is high and the value function is plastic)
      # rather than introduced here for the first time. The stage's own
      # ``capture: 2000`` remains as a fallback for any structure type
      # that isn't covered by a per-type key (none currently exist).
      reward_config:
        win_by_hq_capture: 3000.0
        win_by_elimination: 3000.0
        seize_progress: 50.0
        capture: 2000.0

    - name: beginner_simple
      map_file: maps/1v1/beginner.csv
      opponent: simple
      promotion_win_rate: 0.85
      patience: 2
      max_timesteps: 2_500_000
      n_eval_episodes: 60
      max_steps: 1500
      max_turns: 100
      ent_coef: 0.05
      reward_config:
        win_by_hq_capture: 3000.0
        win_by_elimination: 3000.0
        seize_progress: 50.0
        capture: 2000.0

    - name: beginner_medium
      map_file: maps/1v1/beginner.csv
      opponent: medium
      promotion_win_rate: 0.65
      patience: 2
      max_timesteps: 4_000_000
      n_eval_episodes: 60
      max_steps: 1500
      max_turns: 100
      ent_coef: 0.05
      reward_config:
        win_by_hq_capture: 3000.0
        win_by_elimination: 3000.0
        seize_progress: 50.0
        capture: 2000.0
