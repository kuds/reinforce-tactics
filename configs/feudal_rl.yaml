# Feudal RL (Manager-Worker) training config.
algorithm: feudal
total_timesteps: 10000000
seed: 0

env:
  opponent: bot
  max_steps: 500
  n_envs: 1            # Feudal RL runs a single stateful env

ppo:
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.05
  vf_coef: 0.5
  max_grad_norm: 0.5
  device: auto
  # LR schedule across the total budget. ``constant`` keeps base LR; ``linear``
  # anneals to zero at total_timesteps.
  lr_schedule: constant

feudal:
  manager_horizon: 10
  worker_reward_alpha: 0.5
  manager_lr_scale: 1.0
  worker_lr_scale: 1.0
  # AlphaStar-style autoregressive worker head with stage-conditional masking.
  # Requires the env to expose structured_action_masks() (StrategyGameEnv does);
  # falls back to unmasked sampling otherwise.
  autoregressive_worker: false
  # Multiplier on extrinsic rewards before they enter the rollout buffer.
  # Default 1.0 keeps the env's reward shape; set to e.g. 0.001 when terminal
  # win/loss magnitudes (±5000) blow up the value-function MSE.
  reward_scale: 1.0

eval:
  eval_freq: 10000
  n_eval_episodes: 10
  checkpoint_freq: 50000

logging:
  log_dir: ./logs
  tensorboard: true
