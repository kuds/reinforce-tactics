# PPO bootstrap curriculum.
#
# Trains a single MaskablePPO policy through a sequence of stages, advancing
# only when the eval win-rate stays at or above `promotion_win_rate` for
# `patience` consecutive evaluations. The final checkpoint is intended as a
# warm-start for self-play (notebooks/ppo_training.ipynb).
#
# Hard cutoff between stages (no opponent mixing). If a stage exhausts its
# `max_timesteps` budget without promoting, the runner raises
# CurriculumStalled — investigate (reward shaping, hyperparams) before
# raising the budget blindly.
seed: 42
n_envs: 4
eval_freq: 50_000

env:
  max_steps: 400
  max_turns: 20
  enabled_units: [W, M, A]
  action_space_type: flat_discrete
  reward_config:
    win_by_hq_capture: 5000.0
    win_by_elimination: 1000.0
    win: 5000.0
    loss: -5000.0
    draw: -5000.0
    income_diff: 0.5
    unit_diff: 1.0
    structure_control: 10.0
    create_unit: 0.0
    move: 0.0
    damage_scale: 0.0
    kill: 0.0
    seize_progress: 300.0
    capture: 1000.0
    cure: 0.0
    heal_scale: 0.0
    paralyze: 0.0
    haste: 0.0
    defence_buff: 0.0
    attack_buff: 0.0
    invalid_action: -10.0
    turn_penalty: -20.0

ppo:
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.05
  vf_coef: 0.5
  max_grad_norm: 0.5
  # SB3 defaults `net_arch` to [64, 64], which is undersized for this env:
  # ~734 input dims (grid + units + global + action_mask) feeding a 64-dim
  # bottleneck before a flat-discrete head with up to 512 logits. The
  # policy literally has fewer hidden dims than action choices. Bump to
  # [256, 256] (~150K params total) so the value head can actually
  # distinguish board states across map transitions -- previous runs
  # showed catastrophic value dislocation on starter -> beginner that's
  # plausibly capacity-limited as well as transfer-limited.
  policy_kwargs:
    net_arch:
      pi: [256, 256]
      vf: [256, 256]

# Curriculum:
#   starter map: noop -> random -> simple -> medium
#   beginner map: noop -> balanced_random -> random -> simple -> medium
#
# Both maps start with NoopBot (a stage-0 sanity check: with no enemy
# action at all, even a weak policy should be able to walk a unit onto
# the enemy HQ and seize it). This catches "agent can't navigate at all"
# before adding opponent dynamics.
#
# Opponent intensity on the beginner ramp:
#   - noop:             opponent takes no actions; pure navigation/seize.
#   - balanced_random:  one build attempt + one random action per owned
#                       unit per turn (BalancedRandomBot). Action
#                       throughput scales with army size, which avoids the
#                       pathological case of RandomBot(max_actions=1)
#                       stalling out after losing its only unit.
#   - random:           up to 20 random actions per turn (the stress-test
#                       baseline; the original `random` opponent).
#
# Per-stage overrides handle the starter -> beginner transition:
#   - max_steps / max_turns:  bigger map needs ~3x the turn budget
#                             (units take longer to traverse).
#   - ent_coef:               modestly elevated on the first beginner
#                             stages so the policy can adapt navigation
#                             to a bigger map without regressing.
#   - reward_config:          ONLY on beginner stages WITH opponents.
#                             Beginner-map geometry makes HQ capture much
#                             harder than elimination once enemy units are
#                             on the board, so we equalize the two terminal
#                             rewards (was 5000/1000) and drop
#                             `seize_progress` so the agent stops being
#                             paid to start seizes it can't finish in
#                             contested space.
#                             NOT applied to `beginner_noop`: that stage
#                             has no enemy units (NoopBot never builds), so
#                             HQ capture is the ONLY win path. It inherits
#                             the env defaults (5000 HQ, 300 seize/turn)
#                             which are well-tuned for that goal.
#
# Starter stages use `patience: 1` so we promote at the first hit of the
# threshold rather than letting the policy keep training on a saturated
# reward signal -- that's how the previous run produced std=0.0 fully
# deterministic policies that didn't transfer.
stages:
  - name: starter_noop
    map_file: maps/1v1/starter.csv
    opponent: noop
    # NoopBot is a stage-0 sanity check: agent should be able to walk a
    # unit onto the enemy HQ and seize it even with zero opposition. Tight
    # patience because if the agent can't beat noop, longer training
    # won't help -- the issue is policy or reward, not opponent strength.
    promotion_win_rate: 0.95
    patience: 1
    max_timesteps: 500_000
    n_eval_episodes: 30
    # Higher entropy on the FIRST stage breaks the "dead policy" trap a
    # freshly-initialised PPO can fall into against a deterministic
    # opponent: with no opponent variance, a near-uniform initial policy's
    # argmax tends to land on `end_turn`, every rollout produces the same
    # draw reward, the value function flattens, advantages collapse to
    # ~0, and gradients can't shift the mode. Higher entropy makes
    # stochastic exploration occasionally produce a winning trajectory,
    # which restores gradient signal.
    ent_coef: 0.10
    # Reward shape on noop stages is tuned to break the structural bias
    # toward `end_turn` we observed in earlier runs (PPO drifted
    # 19% -> 26% end_turn over 50k steps even with create_unit=+30 and
    # ent_coef=0.10). Two changes:
    #
    # 1. `turn_penalty: 0`. NoopBot puts no time pressure on the agent --
    #    a global -20/turn penalty just creates a constant negative
    #    baseline that makes "end the turn faster" structurally
    #    attractive even though it doesn't actually shorten the
    #    fixed-length episode. Removing it gives `end_turn` a neutral
    #    value (0) instead of a positive one (escaping more penalty),
    #    which lets the positive signals below dominate.
    #
    # 2. `create_unit: 10`, `move: 0.5`. Tiny per-action positives that
    #    establish a strict ordering: seize_progress (300) > capture
    #    (1000) > create_unit (10) > move (0.5) > end_turn (0). Any
    #    non-end_turn action is strictly preferred, so the policy has
    #    to *learn* that end_turn is right in some states (no legal
    #    units to act with), not default to it.
    #
    # The HQ-capture defaults (5000 + 300/turn seize + 1000 capture) are
    # left intact -- HQ capture is the only winning path on noop and
    # we want maximum signal there.
    reward_config:
      turn_penalty: 0.0
      create_unit: 10.0
      move: 0.5

  - name: starter_random
    map_file: maps/1v1/starter.csv
    opponent: random
    promotion_win_rate: 0.90
    patience: 1
    max_timesteps: 1_000_000
    n_eval_episodes: 30

  - name: starter_simple
    map_file: maps/1v1/starter.csv
    opponent: simple
    promotion_win_rate: 0.90
    patience: 1
    max_timesteps: 2_000_000
    n_eval_episodes: 30

  - name: starter_medium
    map_file: maps/1v1/starter.csv
    opponent: medium
    promotion_win_rate: 0.75
    patience: 1
    max_timesteps: 3_000_000
    n_eval_episodes: 30

  - name: beginner_noop
    map_file: maps/1v1/beginner.csv
    opponent: noop
    promotion_win_rate: 0.90
    patience: 2
    max_timesteps: 1_000_000
    n_eval_episodes: 30
    max_steps: 800
    max_turns: 60
    # Same dead-policy guards as `starter_noop`: ent_coef=0.10 to keep
    # exploration alive, plus the same reward overrides
    # (turn_penalty: 0, create_unit: 10, move: 0.5) that establish a
    # strict positive ordering over non-`end_turn` actions and remove
    # the structural bias toward `end_turn`. See starter_noop's comment
    # block for the full rationale.
    ent_coef: 0.10
    reward_config:
      turn_penalty: 0.0
      create_unit: 10.0
      move: 0.5

  - name: beginner_balanced_random
    map_file: maps/1v1/beginner.csv
    # BalancedRandomBot: one build + one random action per owned unit per
    # turn. Lighter than full `random` (20 actions/turn) but resilient --
    # action throughput scales with army size, so killing the bot's units
    # doesn't stall the game.
    opponent: balanced_random
    promotion_win_rate: 0.85
    patience: 2
    max_timesteps: 1_500_000
    n_eval_episodes: 30
    max_steps: 800
    max_turns: 60
    ent_coef: 0.07
    reward_config:
      win_by_hq_capture: 3000.0
      win_by_elimination: 3000.0
      seize_progress: 50.0
      capture: 2000.0

  - name: beginner_random
    map_file: maps/1v1/beginner.csv
    opponent: random
    promotion_win_rate: 0.75
    patience: 2
    max_timesteps: 2_000_000
    n_eval_episodes: 30
    max_steps: 800
    max_turns: 60
    # Cooled further -- agent has now seen both noop and random_1.
    ent_coef: 0.05
    reward_config:
      win_by_hq_capture: 3000.0
      win_by_elimination: 3000.0
      seize_progress: 50.0
      capture: 2000.0

  - name: beginner_simple
    map_file: maps/1v1/beginner.csv
    opponent: simple
    promotion_win_rate: 0.85
    patience: 2
    max_timesteps: 2_500_000
    n_eval_episodes: 30
    max_steps: 800
    max_turns: 60
    ent_coef: 0.05
    reward_config:
      win_by_hq_capture: 3000.0
      win_by_elimination: 3000.0
      seize_progress: 50.0
      capture: 2000.0

  - name: beginner_medium
    map_file: maps/1v1/beginner.csv
    opponent: medium
    promotion_win_rate: 0.65
    patience: 2
    max_timesteps: 4_000_000
    n_eval_episodes: 30
    max_steps: 800
    max_turns: 60
    ent_coef: 0.05
    reward_config:
      win_by_hq_capture: 3000.0
      win_by_elimination: 3000.0
      seize_progress: 50.0
      capture: 2000.0
