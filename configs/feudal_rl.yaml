# Feudal RL (Manager-Worker) training config.
algorithm: feudal
total_timesteps: 10000000
seed: 0

env:
  opponent: bot
  max_steps: 500
  n_envs: 1            # Feudal RL runs a single stateful env

ppo:
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.05
  vf_coef: 0.5
  max_grad_norm: 0.5
  device: auto

feudal:
  manager_horizon: 10
  worker_reward_alpha: 0.5
  manager_lr_scale: 1.0
  worker_lr_scale: 1.0

eval:
  eval_freq: 10000
  n_eval_episodes: 10
  checkpoint_freq: 50000

logging:
  log_dir: ./logs
  tensorboard: true
