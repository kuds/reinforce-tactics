# PPO bootstrap curriculum.
#
# Trains a single MaskablePPO policy through a sequence of stages, advancing
# only when the eval win-rate stays at or above `promotion_win_rate` for
# `patience` consecutive evaluations. The final checkpoint is intended as a
# warm-start for self-play (notebooks/ppo_training.ipynb).
#
# Hard cutoff between stages (no opponent mixing). If a stage exhausts its
# `max_timesteps` budget without promoting, the runner raises
# CurriculumStalled — investigate (reward shaping, hyperparams) before
# raising the budget blindly.
seed: 42
n_envs: 4
eval_freq: 50_000

env:
  max_steps: 400
  max_turns: 20
  enabled_units: [W, M, A]
  action_space_type: flat_discrete
  reward_config:
    win_by_hq_capture: 5000.0
    win_by_elimination: 1000.0
    win: 5000.0
    loss: -5000.0
    draw: -5000.0
    income_diff: 0.5
    unit_diff: 1.0
    structure_control: 10.0
    create_unit: 0.0
    move: 0.0
    damage_scale: 0.0
    kill: 0.0
    seize_progress: 300.0
    capture: 1000.0
    cure: 0.0
    heal_scale: 0.0
    paralyze: 0.0
    haste: 0.0
    defence_buff: 0.0
    attack_buff: 0.0
    invalid_action: -10.0
    turn_penalty: -20.0

ppo:
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.05
  vf_coef: 0.5
  max_grad_norm: 0.5

# Curriculum:
#   starter map (random -> simple -> medium)
#     -> bridge stages on beginner: noop -> random_1 -> random -> simple -> medium
#
# The beginner ramp uses three opponent intensities to give the agent a
# smooth gradient of "opponent uncertainty":
#   - noop:      opponent does literally nothing (pure navigation/seize)
#   - random_1:  opponent takes exactly ONE random action per turn (light
#                perturbation; closer to the agent's own action throughput)
#   - random:    opponent takes up to 20 random actions per turn (the
#                stress-test baseline; same as the original `random` opponent)
#
# Per-stage overrides handle the starter -> beginner transition:
#   - max_steps / max_turns:  bigger map needs ~3x the turn budget
#                             (units take longer to traverse).
#   - ent_coef:               one-time bump on `beginner_noop` to break the
#                             starter-map policy out of its rut, cooled in
#                             subsequent stages.
#   - reward_config:          beginner-map geometry makes HQ capture much
#                             harder than elimination, so we equalize the
#                             two terminal rewards (was 5000/1000) and drop
#                             `seize_progress` so the agent stops being
#                             paid to start seizes it can't finish.
#
# Starter stages use `patience: 1` so we promote at the first hit of the
# threshold rather than letting the policy keep training on a saturated
# reward signal -- that's how the previous run produced std=0.0 fully
# deterministic policies that didn't transfer.
stages:
  - name: starter_random
    map_file: maps/1v1/starter.csv
    opponent: random
    promotion_win_rate: 0.90
    patience: 1
    max_timesteps: 1_000_000
    n_eval_episodes: 30

  - name: starter_simple
    map_file: maps/1v1/starter.csv
    opponent: simple
    promotion_win_rate: 0.90
    patience: 1
    max_timesteps: 2_000_000
    n_eval_episodes: 30

  - name: starter_medium
    map_file: maps/1v1/starter.csv
    opponent: medium
    promotion_win_rate: 0.75
    patience: 1
    max_timesteps: 3_000_000
    n_eval_episodes: 30

  - name: beginner_noop
    map_file: maps/1v1/beginner.csv
    opponent: noop
    promotion_win_rate: 0.90
    patience: 2
    max_timesteps: 1_000_000
    n_eval_episodes: 30
    max_steps: 800
    max_turns: 60
    # First stage on the new map -> entropy shock to forget starter
    # heuristics, plus the elimination-friendly shaping below.
    ent_coef: 0.10
    reward_config:
      # Beginner map: HQ capture is impractical, elimination is the natural
      # endpoint. Equalize the terminal rewards and stop paying the agent
      # to *start* seizes that won't finish.
      win_by_hq_capture: 3000.0
      win_by_elimination: 3000.0
      seize_progress: 50.0
      capture: 2000.0

  - name: beginner_random_1
    map_file: maps/1v1/beginner.csv
    opponent: random_1   # one random action per turn; lighter than `random`
    promotion_win_rate: 0.85
    patience: 2
    max_timesteps: 1_500_000
    n_eval_episodes: 30
    max_steps: 800
    max_turns: 60
    ent_coef: 0.07
    reward_config:
      win_by_hq_capture: 3000.0
      win_by_elimination: 3000.0
      seize_progress: 50.0
      capture: 2000.0

  - name: beginner_random
    map_file: maps/1v1/beginner.csv
    opponent: random
    promotion_win_rate: 0.75
    patience: 2
    max_timesteps: 2_000_000
    n_eval_episodes: 30
    max_steps: 800
    max_turns: 60
    # Cooled further -- agent has now seen both noop and random_1.
    ent_coef: 0.05
    reward_config:
      win_by_hq_capture: 3000.0
      win_by_elimination: 3000.0
      seize_progress: 50.0
      capture: 2000.0

  - name: beginner_simple
    map_file: maps/1v1/beginner.csv
    opponent: simple
    promotion_win_rate: 0.85
    patience: 2
    max_timesteps: 2_500_000
    n_eval_episodes: 30
    max_steps: 800
    max_turns: 60
    ent_coef: 0.05
    reward_config:
      win_by_hq_capture: 3000.0
      win_by_elimination: 3000.0
      seize_progress: 50.0
      capture: 2000.0

  - name: beginner_medium
    map_file: maps/1v1/beginner.csv
    opponent: medium
    promotion_win_rate: 0.65
    patience: 2
    max_timesteps: 4_000_000
    n_eval_episodes: 30
    max_steps: 800
    max_turns: 60
    ent_coef: 0.05
    reward_config:
      win_by_hq_capture: 3000.0
      win_by_elimination: 3000.0
      seize_progress: 50.0
      capture: 2000.0
