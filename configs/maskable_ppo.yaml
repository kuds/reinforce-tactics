# MaskablePPO baseline training config.
#
# Run: python train/train_feudal_rl.py --config configs/maskable_ppo.yaml
algorithm: maskable_ppo
total_timesteps: 10000000
seed: 0

env:
  map_file: null          # null -> random maps
  opponent: bot
  max_steps: 500
  n_envs: 4
  use_subprocess: true
  action_space_type: multi_discrete
  fog_of_war: false

ppo:
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.05
  vf_coef: 0.5
  max_grad_norm: 0.5
  use_action_masking: true
  device: auto

eval:
  eval_freq: 10000
  n_eval_episodes: 10
  checkpoint_freq: 50000

logging:
  log_dir: ./logs
  wandb: false
  wandb_project: reinforcetactics
  tensorboard: true
