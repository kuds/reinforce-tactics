# v48 -- multi_discrete A/B vs v43a (does the action space matter?)
# ============================================================================
# Base: v43a (opponent diversity, flat_discrete). Two coupled deltas, all in
# service of ONE question:
#   * action_space_type: flat_discrete -> multi_discrete   (the variable)
#   * max_actions_per_turn: null -> 60                      (required guard)
#   * curriculum truncated to the beginner block            (forced: multi_
#     discrete + pad_to_size is unsupported, so all stages must be one map
#     size -- beginner.csv 6x6). intermediate/skirmish/corner_points dropped.
# Reward, ppo, net_arch [256,256], roster, and the opponent-diversity stages
# are otherwise identical to v43a.
#
# WHY: this is the direct test of review item #2 -- flat_discrete's action
# INDEX is unstable (logit slot k means a different action every state,
# because it indexes a per-step-rebuilt legal-action list), which is a real
# learnability tax. multi_discrete grounds every action dimension (from_x=3 is
# always column 3), so credit assignment is direct. The persistent symptom has
# been a policy that's competent-but-marginal at r15 (v43a peaked 0.8375 then
# couldn't hold it); a stabler action head is the one architectural lever
# never tried. Cost: multi_discrete masks per-dimension (over-approximation),
# so some sampled joint actions are illegal -> invalid-action tax, bounded by
# max_actions_per_turn. v33 proved multi_discrete trains (cleared the beginner
# block), so this is a known-trainable substrate.
#
# READ THE A/B (this vs v43a, comparing the beginner block up to r15):
#   * multi_discrete SUSTAINS r15 (two evals >= 0.70) or holds its peak
#     markedly better than v43a's flat_discrete oscillation -> the flat action
#     head WAS handicapping learning (item #2 confirmed). Adopt multi_discrete
#     going forward -- and BC warm-start becomes FREE (multi_discrete-native,
#     no recorder/padding extension needed for the beginner block).
#   * multi_discrete is roughly the same or worse -> the action space wasn't
#     the bottleneck; the over-approximation tax isn't worth it; stay on
#     flat_discrete (and if pursuing BC on the full curriculum, build the
#     flat-recorder extension).
# Either outcome decides the substrate BEFORE investing in any BC infra work.
#
# Watch the invalid-action rate / avg_length early: if it spikes (over-approx
# not settling), max_actions_per_turn=60 should still bound it into draws
# rather than max_steps truncations.
#
# (Opponent-diversity design is in the v43a header below, inherited unchanged.)
#
# v43a -- opponent diversity (anti-drift), net_arch [256,256]
# ============================================================================
# Base: configs/ppo/bootstrap_sweep/v41_r10_stability.yaml. Reward UNCHANGED
# (combat shaping ON -- the fast-early-ladder setting). The ONLY change vs v41
# is the opponent on the beginner random_{10,15,20} stages: a static RandomBot
# is replaced with a per-episode-varied MixedBot(random@A, random@B) so the
# in-stage gradient is multi-modal.
#
# WHY: v41 (combat shaping) and v42 (combat removed) BOTH stalled at
# beginner_random_15 with the SAME signature -- PPO healthy
# (explained_variance ~0.85, value_loss stable, approx_kl ~0.005) but the
# policy DRIFTS off any winning composition and never sustains two evals
# >= 0.70. The doc's "drift vs plateau" diagnostic says this is an
# optimization/attractor problem, not capacity or reward: against a STATIC
# stochastic opponent there is no in-stage gradient, so once PPO finds a
# winning policy nothing pulls it back when it wanders. The reward axis is
# exhausted (both directions stall), so v43 holds reward at v41's fast-ladder
# setting and changes the non-reward lever the doc flagged as "the most
# principled remaining lever" for drift: opponent diversity ("Option C").
#
# Realization (config-only -- MixedBot already forwards easy_kwargs/hard_kwargs
# to RandomBot(max_actions=...); see game/bot.py:_build_inner):
#   beginner_random_10 -> MixedBot(random@10, random@15), p_hard 0.5
#   beginner_random_15 -> MixedBot(random@10, random@20), p_hard 0.5  (brackets
#                         the static max_actions=15 it stalled on)
#   beginner_random_20 -> MixedBot(random@15, random@20), p_hard 0.5
# The per-episode coin flip means consecutive episodes face different opponent
# strengths, so the policy can't settle into a single stalling groove.
#
# v43a vs v43b -- RUN BOTH IN PARALLEL. v43a keeps net_arch [256,256]; v43b is
# identical except net_arch [512,512]. Reading the pair:
#   * v43a clears r15            -> opponent diversity alone fixes the drift;
#                                   capacity unnecessary (save ~1.5-2x compute).
#   * v43b clears, v43a doesn't  -> capacity adds real value on top of the
#                                   drift fix (composition-representation).
#   * neither clears             -> drift+capacity aren't the cracks; escalate
#                                   to BC warm-start (only lever to ever clear
#                                   r15, v33).
#
# CAVEAT: v41's reward keeps a stalled draw marginally net-positive (combat +
# potential farm ~+57/ep vs ~-47 draw penalty). Opponent diversity fixes the
# no-in-stage-gradient root but NOT the profitable-draw root. If v43a/b still
# draw at r15, the result implicates reward too, and the follow-up is opponent
# diversity + v42's combat-OFF reward (draws net-negative).
#
# (v41 header below documents the inherited curriculum / triple-fix.)
#
# v41 -- r10 stability triple-fix (gate + budget + entropy floor)
# =================================================================
# Base: configs/ppo/bootstrap_sweep/v40_skip_starter.yaml.
# v40 run 20260528_020718 stalled at `beginner_random_10` (stage 2 of
# 33). Peak WR 77.5% at 1.55M (above the 0.75 gate) but failed to
# sustain two consecutive evals at >= 0.75 within the 3M budget.
# `run_status.json`: curriculum_stalled, achieved_win_rate 0.775,
# threshold 0.75.
#
# Two things are now true that weren't before:
#
# 1. THE COST NERF WORKED. v40's per-stage composition summary
#    shows Warrior share 41% on balanced_random (cleared) and 28%
#    on r10 (stalled), down from v37b's 100% mono-W on every
#    cleared stage. HQ captures: 9 on stage 1 (was 0). Paralyze
#    used 28 times on stage 1, 9 on stage 2 (was 0). Rogues,
#    Barbarians, Knights, Mages, Archers ALL appearing in builds
#    across r10 evals. Status-effect observation channels finally
#    have non-zero signal because the policy is finally building
#    units that use them. Diversity goal: achieved.
#
# 2. r10 STALL IS A NEW WALL: COMPOSITION STABILITY. The policy
#    discovers >=5 viable compositions across 3.2M steps but
#    abandons each one within ~50-100k steps before the next:
#
#     1550k: 77.5% mass-Archer (W=206, A=4130, 3 HQ captures)
#     1900k: 65.0% Warrior+Mage+Cleric (W=3331, M=544, C=604)
#     2000k: 58.75% Warrior+Knight mix
#     2050k: 58.75% Warrior+Cleric+Knight
#     2850k: 61.25% Warrior+Knight (K=4755)
#     2950k: 55.0% near-pure Knight (K=4867)
#
#    Each peak is a real winning policy at a single eval; none
#    survive the next 50k steps of PPO updates. This is the
#    draw-with-shaping policy-drift instability documented for
#    the v17-v23 sweep and v35/v36 -- now manifesting at the
#    composition layer, not just the value-function layer.
#
# v41 applies THREE stability levers simultaneously to
# `beginner_random_10`, each targeting a different facet of the
# drift problem. Stacking is deliberate: v34-v40 already isolated
# the balance levers; v41 is engineering a stable promotion, not
# a single-variable ablation. If r10 clears under the triple-fix,
# follow-up runs can ablate to see which lever did the work.
#
# Lever A: promotion_win_rate 0.75 -> 0.65
#   v40 hit 0.775 once (above the 0.75 gate) and ~0.55-0.65 at
#   four other peaks. At 0.65, the second peak at 1900k (0.65)
#   would itself have qualified, and any two of the multiple
#   55-65% recoveries in 2.0-2.95M would have triggered patience-2
#   promotion. The lever does NOT lower the bar for composition
#   quality -- the cleared stages downstream still gate at 0.65-
#   0.85, so a 0.65 r10 still produces a competent policy. It
#   recognises that beating RandomBot at max_actions=10 with
#   diverse composition is a different (harder) skill than
#   beating RandomBot with mono-Warrior, and the threshold from
#   v34 was calibrated against the mono-W policy class.
#
# Lever B: max_timesteps 3,000,000 -> 5,000,000
#   v40's recovery cycle is real and ~1M steps long (peaks at
#   ~1.55M, ~1.9-2.05M, ~2.85-2.95M). 5M gives the policy 5
#   independent ~1M-cycle attempts to land 2 consecutive evals
#   above 0.65, vs v40's 3 attempts. Cost: ~25 min of additional
#   L4 wall-clock on this stage if it goes the distance.
#
# Lever C: ent_coef end 0.03 -> 0.01
#   v40's r10 schedule is linear 0.10 -> 0.03 over the stage.
#   With entropy floor 0.03, the policy is still injecting
#   meaningful exploration noise at end of budget, which is
#   exactly what makes the policy abandon a working composition
#   for the next one. Dropping to 0.01 (matching v40's r20 floor)
#   tightens commitment late in the stage without removing early
#   exploration. v34/v17 used this floor on `beginner_random_20`
#   for the same "convert recovery into clear" problem.
#
# Decision tree for v41 outcomes:
#   * Clears r10 (>= 0.65 for 2 evals) -> apply the same triple-
#     fix to r15 (also stochastic, same drift signature expected)
#     and likely r20 in v42. Bias: if r10 needed all three levers,
#     r15/r20 against harder opponents likely need at least
#     two of them.
#   * Stalls r10 again at similar 60-80% peaks -> r10 needs more
#     than stability. Could be the cost nerf is on the right axis
#     but too aggressive (W cost 300 -> 275 halfway). Could be
#     capacity (net_arch [256,256] -> [512,512]).
#   * Stalls r10 at LOWER peaks than v40 (< 0.55) -> lever C or
#     the budget extension destabilised what was working. Roll
#     back C first (return to ent_coef end 0.03), then B.
#
# What v41 carries forward from v40 (unchanged):
#   * Skip starter; curriculum opens on beginner_balanced_random.
#   * engine_overrides: W cost=300 (only override).
#   * MixedBot bridge stage beginner_mixed_r15_simple.
#   * Intermediate r10/r15 + intermediate max_turns=75.
#   * v34 combat-shaping reward (damage_scale=0.002, kill=0.2).
#   * Every other stage's threshold / budget / ent_coef.
#
# Only `beginner_random_10` changes vs v40. Three lines of delta.
#
# (v40 header below documents the skip-starter rationale.)
#
# v40 -- skip starter entirely (curriculum begins on beginner map)
# =================================================================
# Base: configs/ppo/bootstrap_sweep/v39_cost_only_nerf.yaml.
# v39 run 20260528_005831 stalled at the first stage (starter_random,
# best WR 35%) -- WORSE than v38 (51%) despite the surgical cost-only
# nerf preserving every combat stat. Diagnosis: starter's economy is
# the binding constraint, not the Warrior stat line.
#
# Starter map facts (maps/1v1/starter.csv, env defaults):
#   * max_turns: 20      (hard cap; no other map is this tight)
#   * Starting gold:     ~$250 per side
#   * Map size:          small (4x5 effective)
#   * Per-turn income:   ~$50 from owned HQ + ~$25/tower if held
#
# Under v39's W cost=300:
#   * Round 1: $250 -> can't afford a Warrior at all (Mage also 300)
#   * Round 2: $300 -> one Warrior, OR one Archer ($250) + $50 banked
#   * Per-turn unit budget: ~1 unit per 2 turns at best
# Net effect: by the time both sides have ~5 units the clock is near
# expiry, and ~80% of evals end as max_turns draws regardless of who
# was "winning". The price nerf is correct for beginner/intermediate
# (where economy + clock support the strategic tradeoff) but
# pathological on starter.
#
# v40 RESOLUTION: drop starter entirely.
#
# Curriculum now begins at beginner_balanced_random. Justification:
#   1. Starter exists to teach navigation cheaply on a tiny map. By
#      the time the policy reaches beginner_balanced_random it has
#      cleared starter at 90%+ -- starter is a warm-up, not a skill
#      gate. Removing it costs no transferable competence.
#   2. beginner_balanced_random already uses an entropy schedule
#      (0.10 -> 0.03) appropriate for cold-start exploration -- it
#      can serve as stage 1 unchanged.
#   3. beginner.csv (6x6) has $400 starting gold and max_turns=75
#      (per-stage override), so Warrior cost=300 leaves real strategic
#      headroom: 1 W on T1, 1 W on T2 from base income, etc.
#   4. Side benefit: ~250k env steps and ~30 min of L4 wall-clock saved
#      per run on the now-skipped starter ladder.
#
# What v40 inherits unchanged from v39:
#   * Warrior cost=300 (only engine override).
#   * MixedBot bridge stage beginner_mixed_r15_simple.
#   * Intermediate r10/r15 + max_turns=75.
#   * beginner_random_10 budget 3M.
#   * v34 combat-shaping reward (damage_scale=0.002, kill=0.2).
#
# Decision tree for v40 outcomes:
#   * Clears beginner_balanced_random + r10/r15/r20 with diverse
#     composition -> the nerf works once economy is unconstrained;
#     starter was the only blocker. Lock in production curriculum.
#   * Clears starter-equivalent stages but still mono-W on r20 ->
#     price isn't the binding lever even with enough budget. Falsifies
#     "balance lever alone forces diversity"; next step is BC warm-
#     start or explicit diversity-bonus reward term.
#   * Stalls at beginner_balanced_random (high draw rate, low WR) ->
#     the issue is deeper than starter economics. Most likely cause
#     would be the cost change interacting with beginner's pre-owned
#     buildings (different income curve from intermediate's neutral
#     race). Roll back to W cost=250 (halfway).
#   * Stalls at the v37b/v34 wall (intermediate_random_20) -> balance
#     levers exhausted. Capacity bump or BC warm-start becomes the
#     next escalation.
#
# (v39 header below documents the cost-only Warrior nerf rationale;
# v40 inherits the engine override byte-identical, only the
# curriculum's first three stages are removed.)
#
# v39 -- cost-only Warrior nerf (no combat stat changes)
# ======================================================
# Base: configs/ppo/bootstrap_sweep/v38_structural_warrior_nerf.yaml.
# v38 run 20260527_200511 stalled at the first stage (starter_random,
# 51.25% WR best vs 0.90 threshold) because its triple stat nerf
# (atk 10->7, def 6->3, HP 15->13) made combat math too slow for
# starter's max_turns=20 -- both sides took 3-4 turns per kill, games
# ran out the clock as draws (50-70 draws per 80-episode eval). The
# nerf broke "winning at all", not just mono-Warrior.
#
# v39 replaces the stat nerf with a SINGLE cost change:
#
# engine_overrides:
#   unit_data:
#     W: {cost: 300}    # 200 -> 300 (matches Mage cost)
#
# Warrior keeps every combat stat at default (atk=10, def=6, HP=15)
# so games end normally. Only the opportunity cost of mono-Warrior
# changes: at 300 gold per Warrior, the policy can build half as
# many for the same income. Combined with Knight (cost 350) and Mage
# (cost 300) now sharing or undercutting Warrior's per-gold value,
# the mono-W local optimum loses its only remaining edge.
#
# Post-nerf cost-efficiency table:
#   W: cost 300  HP/$ 0.050  Atk/$ 0.033  Def 6   (was cost 200 -> top of every axis)
#   K: cost 350  HP/$ 0.051  Atk/$ 0.023  Def 5   (NOW wins HP/$; charge -> Atk/$ 0.034 wins too)
#   M: cost 300  HP/$ 0.033  Atk/$ 0.040  Def 4   (wins Atk/$ at range, with paralyze)
#   A: cost 250  HP/$ 0.060  Atk/$ 0.020  Def 1   (NOW wins HP/$ among ranged-or-cheap units)
#
# Three units now win cost-efficiency axes that Warrior used to
# dominate: Knight on HP/$, Mage on Atk/$ at range, Archer on HP/$
# at the cheapest tier. PPO can no longer point to "build cheapest
# unit with best HP/$" -- there isn't one anymore.
#
# (Older v38/v37/v36/v35/v34 headers retained in v39 -- see that file
# for the full nerf-iteration history.)
algorithm: maskable_ppo
seed: 42
total_timesteps: 22_000_000  # informational; per-stage budgets drive run length

env:
  # 8 envs leaves headroom on a 12-vCPU machine for the main process
  # (PPO update + eval) without contention. SubprocVecEnv is required
  # for real CPU parallelism with n_envs > 1.
  n_envs: 8
  use_subprocess: true
  # max_steps is uniform across stages: 3000 is well above any
  # realistic game length (max_turns=120 * ~20 env-steps/turn ~ 2400)
  # so truncation never fires under normal play. Per-stage max_turns
  # still varies (75 / 120 / 200) to bound the natural game-clock.
  max_steps: 3000
  # v40: starter (max_turns=20) is no longer in the curriculum, so the
  # env default tracks the new first stage (beginner_balanced_random,
  # max_turns=75). Every remaining stage sets its own max_turns
  # override anyway, so this only matters as a safety default.
  max_turns: 75
  # Per-game-turn hard cap on agent actions. When the policy has taken
  # this many actions in a single game-turn without ending the turn,
  # the action mask narrows to end_turn-only on subsequent steps,
  # forcing the turn to close. Bounded blast-radius defense against
  # the "never end the turn" attractor that re-emerges as max_steps
  # is raised (eval signature: ``len`` near ``max_steps`` with
  # ``turns`` very low).
  #
  # Disabled (``null``) here so per-stage stall traces capture the
  # unmodified policy behaviour. If the v34 turn_penalty: -0.5 ever
  # surfaces the never-end-turn signature in eval (avg_length near
  # max_steps with avg_turns < 5), set this back to 60.
  # v48: cap per-turn actions (was null). multi_discrete's per-dim masking is
  # an over-approximation -- the policy can pick per-dim-legal-but-jointly-
  # invalid actions -- so the cap bounds the never-end-turn invalid-spam mode
  # (Failure mode G) that an uncapped multi_discrete run is prone to. 60
  # comfortably covers a healthy turn on beginner.
  max_actions_per_turn: 60
  # v48: multi_discrete (was flat_discrete) -- THE single variable under test
  # vs v43a. Stable per-dimension action semantics (from_x=3 == column 3
  # always) vs flat_discrete's per-step-shifting index (item #2). Also makes
  # the curriculum BC-native. NOTE: multi_discrete + pad_to_size is
  # unsupported, so this config is beginner-block-only -- the
  # intermediate/skirmish/corner_points stages are dropped (all remaining
  # stages are beginner.csv 6x6, so no padding is needed).
  action_space_type: multi_discrete
  # v40 inherits v39's COST-ONLY Warrior nerf unchanged. Warrior keeps
  # every combat stat at default (atk=10 / def=6 / HP=15) so games end
  # normally; only the PRICE moves (200 -> 300, equal to Mage). v40's
  # change from v39 is in the curriculum, not the unit balance.
  engine_overrides:
    unit_data:
      W: {cost: 300}
  reward_config:
    win_by_hq_capture: 50.0
    win_by_elimination: 50.0
    win: 50.0
    loss: -50.0
    draw: -10.0    # softer than loss: draws are bad but not catastrophic;
                   # equal-to-loss was fighting the policy that learned to
                   # not-lose but couldn't close (run 4 docs recommendation)
    income_diff: 0.05
    unit_diff: 0.3
    structure_control: 1.0
    create_unit: 0.0
    move: 0.0
    # Combat shaping re-enabled at reduced magnitude (scaled to current 1/100
    # reward regime). Run 1 (damage_scale:0.5, kill:50 at old 5000-win scale)
    # was the ONLY run to ever clear beginner_random_20 (76.7% WR). Runs 2-4
    # with these zeroed stalled at 61-71%. Docs recommend lower magnitude:
    # 0.2/20 at old scale -> 0.002/0.2 at current scale. Creates gradient to
    # finish games (kills), not just avoid losing (draws).
    damage_scale: 0.002
    kill: 0.2
    seize_progress: 3.0
    capture: 10.0            # back-compat fallback (no longer reached
                             # when the per-type keys below are set)
    # Per-structure capture differentiation. Hoisted to the global env
    # config (rather than scoped to a single late stage) so every stage
    # in the curriculum sees the same gradient: building captures are
    # the highest per-turn payoff, HQ captures are a viable finisher,
    # and neutral towers are positive-but-not-dominant. Rationale:
    # introducing a new strategy mid-curriculum (only at random_20)
    # asks the policy to discover and integrate it after entropy has
    # already cooled to 0.03 and the value function has locked in on
    # the warrior-spam-elimination attractor from earlier stages. Far
    # easier to bake in the correct inductive bias from stage 1, when
    # entropy is high and the value function is plastic. Both starter
    # and beginner maps have HQs, buildings, and towers in equivalent
    # layouts, so the gradient is meaningful on every stage.
    tower_capture: 15.0      # neutral towers; modest downweight on the
                             # local optimum the prior run converged to
    building_capture: 40.0   # enemy economy; ~20.5/turn vs tower 8/turn
                             # makes this the per-turn-best capture target
    hq_capture: 25.0         # stacks with win_by_hq_capture (+50) so
                             # HQ seize pays ~18.75/turn including terminal
    cure: 0.0
    heal_scale: 0.0
    paralyze: 0.0
    haste: 0.0
    defence_buff: 0.0
    attack_buff: 0.0
    invalid_action: -0.1
    # v27 isolation: win_speed_bonus:50 and enemy_owned_capture:-15 are
    # independently proven stall causes at beginner_random_15 (v27a/c).
    # enemy_neutral_capture:-8 is benign (v27b cleared with it).
    # turn_penalty:-0.5 stronger pressure to end games; -0.2 was insufficient
    # to escape the draw attractor at beginner_random_15/20.
    turn_penalty: -0.5
    win_speed_bonus: 0.0
    enemy_neutral_capture: -8.0
    enemy_owned_capture: 0.0


ppo:
  learning_rate: 3.0e-4
  n_steps: 2048             # 2048 * 8 = 16384 transitions per PPO update
  batch_size: 256           # bumped from 64 -- L4 absorbs much bigger minibatches
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.05
  vf_coef: 0.5
  max_grad_norm: 0.5
  policy_kwargs:
    net_arch:
      pi: [256, 256]
      vf: [256, 256]
    # CNN trunk over the (grid, units) spatial planes. Without this SB3's
    # default ``CombinedExtractor`` flattens both planes — the policy
    # then has to relearn map adjacency from a flat vector and pays a
    # large parameter cost on the first Linear layer (input grows with
    # H * W * channels). ``pool: masked_avg`` makes the trunk's output
    # size independent of ``pad_to_size`` *and* skips padded cells in
    # the spatial average, which matters because early-curriculum stages
    # train on 6x6 maps padded up to (10, 12) — under plain ``avg`` the
    # global average pool would be ~70% zero-padding noise on those
    # stages. ``coord_conv`` prepends two normalized (y, x) channels so
    # the policy can reason about absolute position (HQ corner, etc.)
    # without spending conv capacity rediscovering it. ``extra_conv``
    # adds a 4th 3x3 conv block, lifting the receptive field from ~7x7
    # to ~9x9 — most of corner_points (10x12) in one CNN look.
    features_extractor_class: reinforcetactics.rl.extractors.SpatialFeatureExtractor
    features_extractor_kwargs:
      features_dim: 256
      pool: masked_avg
      coord_conv: true
      extra_conv: true

eval:
  # eval_freq is in env steps across all sub-envs. With n_envs=8 and
  # n_steps=2048, one PPO update = 16384 env steps, so eval_freq=50000
  # fires ~once per 3 PPO updates -- the efficient ratio for production
  # runs. (20000 was used during the reward-rescale validation runs to
  # catch value-head / reward-signal regressions early; once those were
  # confirmed healthy the eval overhead at that cadence -- ~half of
  # wall-clock -- stopped being worth it.) Per-stage
  # CurriculumStage.n_eval_episodes overrides this default for stages
  # that need tighter CIs.
  eval_freq: 50_000
  n_eval_episodes: 80

curriculum:
  stages:
    # v40: starter_random / starter_simple / starter_medium REMOVED.
    # Curriculum now opens directly on beginner_balanced_random.
    # Rationale documented in the v40 header above. The beginner-
    # balanced-random stage already carries an entropy schedule
    # appropriate for cold-start (0.10 -> 0.03), so no adjustment
    # is needed to make it a viable stage 1.

    - name: beginner_balanced_random
      map_file: maps/1v1/beginner.csv
      opponent: balanced_random
      promotion_win_rate: 0.85
      patience: 2
      max_timesteps: 1_500_000
      n_eval_episodes: 80
      max_turns: 75
      ent_coef:
        start: 0.10
        end: 0.03
        schedule: linear

    # v36 budget bump on this stage only (1.5M -> 3M). v35 run
    # 20260526_205537 stalled here at the end of the 1.5M budget with WR
    # trending upward: last 5 evals were 44% / 19% / 15% / 36% / 51%.
    # The trajectory shows the policy was recovering from the
    # draw-with-shaping attractor (final 200k delta: +16pp WR with
    # diversified composition + 2 HQ captures appearing for the first
    # time in any run). Doubling the budget gives the recovery another
    # ~1M steps to consolidate. If 3M still isn't enough, the next
    # iteration is a smaller Warrior nerf (atk 10->9 instead of 8) --
    # the current nerf works for composition but destabilises the
    # transfer policy. Other random_N stages (15/20 here, and the
    # intermediate ones) are left at their v35 budgets so this
    # experiment isolates the single-stage budget delta -- if v36
    # clears r10 cleanly we can decide whether to pre-bump the others.
    # v41 triple-fix on this stage only (gate + budget + entropy floor).
    # See header for full rationale. Delta vs v40:
    #   promotion_win_rate  0.75       -> 0.65       (lever A)
    #   max_timesteps       3_000_000  -> 5_000_000  (lever B)
    #   ent_coef end        0.03       -> 0.01       (lever C)
    # Stack is deliberate; ablation deferred to a follow-up if it
    # clears. v40 showed five viable compositions (peak 77.5% at
    # 1.55M, then 65%/59%/59%/61%/55%) but never two evals in a row
    # above the old 0.75 gate.
    - name: beginner_random_10
      map_file: maps/1v1/beginner.csv
      # v43: opponent diversity. Per-episode-varied RandomBot (max_actions 10
      # or 15, 50/50) instead of a static max_actions=10. The multi-modal
      # opponent gives an in-stage gradient that resists the draw-with-shaping
      # drift (the policy can't settle into one stalling groove when the
      # opponent strength changes episode to episode).
      opponent: mixed
      opponent_kwargs:
        easy: random
        hard: random
        p_hard: 0.5
        easy_kwargs:
          max_actions: 10
        hard_kwargs:
          max_actions: 15
      promotion_win_rate: 0.65
      patience: 2
      max_timesteps: 5_000_000
      n_eval_episodes: 80
      max_turns: 75
      ent_coef:
        start: 0.10
        end: 0.01
        schedule: linear

    - name: beginner_random_15
      map_file: maps/1v1/beginner.csv
      # v43: opponent diversity at THE WALL. Per-episode-varied RandomBot
      # (max_actions 10 or 20, 50/50) brackets the static max_actions=15 that
      # both v41 and v42 stalled on. The multi-modal opponent is the doc's
      # "Option C" anti-drift lever: a static stochastic opponent gives no
      # in-stage gradient, so PPO drifts off any winning policy; varying the
      # opponent per episode supplies one.
      opponent: mixed
      opponent_kwargs:
        easy: random
        hard: random
        p_hard: 0.5
        easy_kwargs:
          max_actions: 10
        hard_kwargs:
          max_actions: 20
      promotion_win_rate: 0.70
      patience: 2
      max_timesteps: 3_000_000
      n_eval_episodes: 80
      max_turns: 75
      ent_coef:
        start: 0.10
        end: 0.03
        schedule: linear

    # v37a NEW: MixedBot bridge between random_15 and random_20. 50%
    # of episodes face SimpleBot (capture-greedy, bot.py:423-426 sorts
    # by structure-then-enemy priority) which punishes mono-Warrior
    # elimination plays -- if the policy is still all-W after r10/r15,
    # SimpleBot will out-capture it and force structure-defence
    # priority. The other 50% face random_15 so the policy doesn't
    # un-learn its random_N competence. Mirrors the beginner_mixed_50
    # / beginner_mixed_med_adv_50 / intermediate_mixed_random_simple
    # pattern that bootstrap.yaml already uses to bridge harder
    # opponent transitions. Threshold 0.65 / patience 2 / budget 2.5M
    # match beginner_mixed_50's settings. Requires PR #383's MixedBot
    # easy_kwargs forwarding so max_actions=15 propagates to the
    # RandomBot side.
    - name: beginner_mixed_r15_simple
      map_file: maps/1v1/beginner.csv
      opponent: mixed
      opponent_kwargs:
        easy: random
        hard: simple
        p_hard: 0.5
        easy_kwargs:
          max_actions: 15
      promotion_win_rate: 0.65
      patience: 2
      max_timesteps: 2_500_000
      n_eval_episodes: 80
      max_turns: 75
      ent_coef:
        start: 0.07
        end: 0.03
        schedule: linear

    - name: beginner_random_20
      map_file: maps/1v1/beginner.csv
      # v43: opponent diversity. Per-episode-varied RandomBot (max_actions 15
      # or 20, 50/50) instead of static max_actions=20 -- keeps the difficulty
      # ramp (avg ~17.5, above r15's ~15) while supplying the in-stage gradient.
      opponent: mixed
      opponent_kwargs:
        easy: random
        hard: random
        p_hard: 0.5
        easy_kwargs:
          max_actions: 15
        hard_kwargs:
          max_actions: 20
      # Hardest random stage. Lower bar than random_15 (0.65 vs 0.70)
      # because run 4 plateaued at ~62% WR against this opponent on the
      # prior reward shape and was still budget-limited; 0.65 leaves room
      # for the policy to clear without requiring runs to outperform that
      # baseline by more than a few points.
      promotion_win_rate: 0.70
      patience: 2
      max_timesteps: 3_000_000
      n_eval_episodes: 80
      max_turns: 75
      # Lower end-of-schedule floor than other stages (0.01 vs 0.03):
      # this is the longest stage at 3M steps and the policy needs to
      # commit during the last ~1M to convert draws into wins. A 0.03
      # floor was still injecting meaningful exploration noise at the
      # end of run 4's budget when the policy was structurally tying.
      ent_coef:
        start: 0.10
        end: 0.01
        schedule: linear

    - name: beginner_simple
      map_file: maps/1v1/beginner.csv
      opponent: simple
      promotion_win_rate: 0.70
      patience: 2
      max_timesteps: 3_000_000
      n_eval_episodes: 80
      max_turns: 75
      ent_coef:
        start: 0.10
        end: 0.03
        schedule: linear

    - name: beginner_mixed_50
      # Bridge stage between simple and medium. MixedBot samples
      # SimpleBot or MediumBot per episode with p_hard=0.5, so half the
      # episodes mirror beginner_simple (which the policy just cleared at
      # 0.70 WR) and half preview beginner_medium. Mirrors the
      # random_10 -> 15 -> 20 ladder: budget sits halfway between the
      # flanking stages (3.5M steps); threshold held at 0.70 to match.
      map_file: maps/1v1/beginner.csv
      opponent: mixed
      opponent_kwargs:
        easy: simple
        hard: medium
        p_hard: 0.5
      promotion_win_rate: 0.70
      patience: 2
      max_timesteps: 3_500_000
      n_eval_episodes: 80
      max_turns: 75
      ent_coef: 0.05

    - name: beginner_medium
      map_file: maps/1v1/beginner.csv
      opponent: medium
      promotion_win_rate: 0.70
      patience: 2
      max_timesteps: 4_000_000
      n_eval_episodes: 80
      max_turns: 75
      ent_coef: 0.05

    - name: beginner_mixed_med_adv_50
      # Bridge stage between medium and advanced. MixedBot samples
      # MediumBot or AdvancedBot per episode with p_hard=0.5: half the
      # episodes mirror beginner_medium (just cleared at 0.70 WR) and
      # half preview beginner_advanced. Threshold (0.65) and budget
      # (4.5M) sit halfway between the flanking stages, mirroring the
      # simple -> mixed_50 -> medium spacing.
      map_file: maps/1v1/beginner.csv
      opponent: mixed
      opponent_kwargs:
        easy: medium
        hard: advanced
        p_hard: 0.5
      promotion_win_rate: 0.70
      patience: 2
      max_timesteps: 4_500_000
      n_eval_episodes: 80
      max_turns: 75
      ent_coef: 0.05

    - name: beginner_advanced
      # AdvancedBot extends MediumBot with map analysis and enhanced
      # tactics (bot.py). Caps the descending-threshold / rising-budget
      # ladder: simple 0.70/3M -> mixed_50 0.70/3.5M -> medium 0.70/4M ->
      # mixed_med_adv_50 0.65/4.5M -> advanced 0.60/5M. The extra ~1M
      # budget accounts for AdvancedBot's tighter play forcing the
      # policy to convert draws into wins on the same map geometry.
      map_file: maps/1v1/beginner.csv
      opponent: advanced
      promotion_win_rate: 0.70
      patience: 2
      max_timesteps: 5_000_000
      n_eval_episodes: 80
      max_turns: 75
      ent_coef: 0.05
