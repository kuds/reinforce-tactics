# PPO bootstrap curriculum, hardware-tuned for Google Colab on an L4 GPU
# (high-RAM tier, 12 vCPUs verified via ``!nproc``).
#
# Loaded by reinforcetactics.rl.config.load_config into a TrainingConfig.
# Stages live under curriculum.stages; if a stage exhausts its
# `max_timesteps` without promoting, the runner raises CurriculumStalled.
#
# Hardware tuning (env.n_envs / env.use_subprocess / ppo.batch_size /
# eval.eval_freq / eval.n_eval_episodes) targets the L4 + 12-vCPU Colab
# tier. Drop n_envs to 4 on free Colab (2 vCPUs); leave the rest as-is.
algorithm: maskable_ppo
seed: 42
total_timesteps: 14_000_000  # informational; per-stage budgets drive run length

env:
  # 8 envs leaves headroom on a 12-vCPU machine for the main process
  # (PPO update + eval) without contention. SubprocVecEnv is required
  # for real CPU parallelism with n_envs > 1.
  n_envs: 8
  use_subprocess: true
  max_steps: 400
  max_turns: 20
  enabled_units: [W, M, A]
  action_space_type: flat_discrete
  reward_config:
    # All reward magnitudes that were calibrated *relative to* the old
    # ~5000-scale terminal rewards are scaled to 1/100 of their original
    # values: terminals, captures, seize_progress, plus the per-turn
    # and per-invalid-action penalties. Prior runs showed value_loss
    # climbing without bound and explained_variance pinned near zero,
    # the canonical signature of value targets outpacing a [256,256]
    # MLP's capacity. Ratios between scaled keys are preserved (a
    # uniform divide), so the curriculum's inductive biases (building >
    # HQ > tower; terminal >> shaping; ~1% turn-penalty pressure
    # relative to a win) carry over unchanged.
    #
    # The per-step potential-shaping signals (income_diff, unit_diff,
    # structure_control) are fed through a potential function
    # (gym_env.py:890) and are policy-invariant under discounted
    # return, but the *undiscounted* eval reward sum carries a bias
    # term -(1-gamma) * sum_t Phi(s_t) that scales with episode
    # length * average Phi. On long beginner episodes (~400 steps)
    # this made eval reward go negative on 100% WR, because Phi was
    # dominated by ``structure_control`` (sticky throughout the game,
    # unlike unit counts which fluctuate). Lowering ``structure_control``
    # to its env default of 1.0 cuts the bias ~10x while leaving the
    # policy's optimum unchanged.
    win_by_hq_capture: 50.0
    win_by_elimination: 10.0
    win: 50.0
    loss: -50.0
    draw: -50.0
    income_diff: 0.5
    unit_diff: 1.0
    structure_control: 1.0
    create_unit: 0.0
    move: 0.0
    damage_scale: 0.0
    kill: 0.0
    seize_progress: 3.0
    capture: 10.0            # back-compat fallback (no longer reached
                             # when the per-type keys below are set)
    # Per-structure capture differentiation. Hoisted to the global env
    # config (rather than scoped to a single late stage) so every stage
    # in the curriculum sees the same gradient: building captures are
    # the highest per-turn payoff, HQ captures are a viable finisher,
    # and neutral towers are positive-but-not-dominant. Rationale:
    # introducing a new strategy mid-curriculum (only at random_20)
    # asks the policy to discover and integrate it after entropy has
    # already cooled to 0.03 and the value function has locked in on
    # the warrior-spam-elimination attractor from earlier stages. Far
    # easier to bake in the correct inductive bias from stage 1, when
    # entropy is high and the value function is plastic. Both starter
    # and beginner maps have HQs, buildings, and towers in equivalent
    # layouts, so the gradient is meaningful on every stage.
    tower_capture: 15.0      # neutral towers; modest downweight on the
                             # local optimum the prior run converged to
    building_capture: 40.0   # enemy economy; ~20.5/turn vs tower 8/turn
                             # makes this the per-turn-best capture target
    hq_capture: 25.0         # stacks with win_by_hq_capture (+50) so
                             # HQ seize pays ~18.75/turn including terminal
    cure: 0.0
    heal_scale: 0.0
    paralyze: 0.0
    haste: 0.0
    defence_buff: 0.0
    attack_buff: 0.0
    invalid_action: -0.1
    turn_penalty: -0.2

ppo:
  learning_rate: 3.0e-4
  n_steps: 2048             # 2048 * 8 = 16384 transitions per PPO update
  batch_size: 256           # bumped from 64 -- L4 absorbs much bigger minibatches
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.05
  vf_coef: 0.5
  max_grad_norm: 0.5
  policy_kwargs:
    net_arch:
      pi: [256, 256]
      vf: [256, 256]

eval:
  # eval_freq is in env steps across all sub-envs. With n_envs=8 and
  # n_steps=2048, one PPO update = 16384 env steps, so eval_freq=20000
  # fires ~once per update. Per-stage CurriculumStage.n_eval_episodes
  # overrides this default for stages that need tighter CIs.
  eval_freq: 20_000
  n_eval_episodes: 80

curriculum:
  stages:
    - name: starter_random
      map_file: maps/1v1/starter.csv
      opponent: random
      promotion_win_rate: 0.90
      patience: 1
      max_timesteps: 1_000_000
      n_eval_episodes: 80

    - name: starter_simple
      map_file: maps/1v1/starter.csv
      opponent: simple
      promotion_win_rate: 0.90
      patience: 1
      max_timesteps: 2_000_000
      n_eval_episodes: 80

    - name: starter_medium
      map_file: maps/1v1/starter.csv
      opponent: medium
      promotion_win_rate: 0.75
      patience: 1
      max_timesteps: 3_000_000
      n_eval_episodes: 80

    - name: beginner_balanced_random
      map_file: maps/1v1/beginner.csv
      opponent: balanced_random
      promotion_win_rate: 0.85
      patience: 2
      max_timesteps: 1_500_000
      n_eval_episodes: 80
      max_steps: 1500
      max_turns: 100
      ent_coef:
        start: 0.10
        end: 0.03
        schedule: linear

    - name: beginner_random_10
      map_file: maps/1v1/beginner.csv
      opponent: random
      opponent_kwargs:
        max_actions: 10
      promotion_win_rate: 0.75
      patience: 2
      max_timesteps: 1_500_000
      n_eval_episodes: 80
      max_steps: 1500
      max_turns: 100
      ent_coef:
        start: 0.10
        end: 0.03
        schedule: linear

    - name: beginner_random_20
      map_file: maps/1v1/beginner.csv
      opponent: random
      opponent_kwargs:
        # Stepping from max_actions=10 (prev stage, 98% WR) straight to 20
        # let the opponent survive long enough that episodes ran out the
        # max_turns clock as draws (W/L/D ~30/0/30, plateauing at 40-60%
        # WR for the full budget). 15 is a softer bridge between stages.
        max_actions: 15
      promotion_win_rate: 0.70
      patience: 2
      max_timesteps: 3_000_000
      n_eval_episodes: 80
      max_steps: 1500
      max_turns: 100
      ent_coef:
        start: 0.10
        end: 0.03
        schedule: linear

    - name: beginner_simple
      map_file: maps/1v1/beginner.csv
      opponent: simple
      promotion_win_rate: 0.70
      patience: 2
      max_timesteps: 3_000_000
      n_eval_episodes: 80
      max_steps: 1500
      max_turns: 100
      ent_coef: 0.05

    - name: beginner_medium
      map_file: maps/1v1/beginner.csv
      opponent: medium
      promotion_win_rate: 0.65
      patience: 2
      max_timesteps: 4_000_000
      n_eval_episodes: 80
      max_steps: 1500
      max_turns: 100
      ent_coef: 0.05
