# Skirmish single-map BC + (eventually) self-play track.
# =================================================================
# Purpose: validate the BC -> PPO/self-play pipeline on ONE map
# (skirmish.csv, 8x8) before generalising. Target benchmark: beat
# AdvancedBot on this map.
#
# Two roles:
#
#  1. ``scripts/build_bc_warmstart.py`` reads ppo.policy_kwargs from
#     this file so the BC checkpoint is built with the same features
#     extractor / net_arch as the downstream model. Without this the
#     BC ckpt has SB3 defaults and set_parameters(exact_match=True)
#     fails on state_dict mismatch.
#
#  2. The post-BC PPO fine-tune (vs AdvancedBot, or vs self-play
#     once wired in) loads this config: warm_start_path points at
#     the BC checkpoint, curriculum is a single skirmish_advanced
#     stage. Self-play replaces the curriculum opponent in a
#     follow-up config once BC vs AdvancedBot is validated.
#
# Constraints (mirror v33, accepted as simplifications):
#   * action_space_type: multi_discrete (BC infra requirement).
#   * Single map_file = maps/1v1/skirmish.csv (single-map track).
#   * No engine_overrides -- BC and PPO share whatever constants.py
#     ships on this branch.
# =================================================================
#
# Placeholder -- update to the path printed by build_bc_warmstart.py
# after the BC build completes.
warm_start_path: benchmarks/bc/YYYYMMDD_HHMMSS/bc_warmstart.zip

algorithm: maskable_ppo
seed: 42
total_timesteps: 1_000_000  # PROBE-SIZED; raise to ~10M once setup is validated

env:
  n_envs: 8
  use_subprocess: true
  max_steps: 3000
  max_turns: 100
  # Hard cap on agent actions within a single game-turn before the
  # mask narrows to end_turn-only. Same defense against the
  # never-end-turn attractor that v33 hit; 60 is comfortably above a
  # healthy skirmish turn's legal-action count.
  max_actions_per_turn: 60
  action_space_type: multi_discrete
  enabled_units: [W, M, C, A, K]
  reward_config:
    # Reward shape lifted from v33 -- same scaling rationale (value
    # head capacity, potential-shaping bias, capture differentiation).
    # All comments in v33_production_bc_warmstart.yaml explaining
    # individual magnitudes apply unchanged here.
    win_by_hq_capture: 50.0
    win_by_elimination: 50.0
    win: 50.0
    loss: -50.0
    draw: -50.0
    income_diff: 0.05
    unit_diff: 0.3
    structure_control: 1.0
    create_unit: 0.0
    move: 0.0
    damage_scale: 0.0
    kill: 0.0
    seize_progress: 3.0
    capture: 10.0
    tower_capture: 15.0
    building_capture: 40.0
    hq_capture: 25.0
    cure: 0.0
    heal_scale: 0.0
    paralyze: 0.0
    haste: 0.0
    defence_buff: 0.0
    attack_buff: 0.0
    invalid_action: -0.1
    turn_penalty: -0.2
    win_speed_bonus: 0.0
    enemy_neutral_capture: 0.0
    enemy_owned_capture: 0.0

ppo:
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 256
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.05
  vf_coef: 0.5
  max_grad_norm: 0.5
  policy_kwargs:
    net_arch:
      pi: [256, 256]
      vf: [256, 256]
    # Same CNN trunk as v33. Skirmish is 8x8 so the masked_avg pool
    # is operating on a fully-non-padded grid (no pad_to_size in this
    # track), but keeping pool=masked_avg means a future multi-map
    # extension can drop in pad_to_size without touching the
    # extractor config. coord_conv prepends normalised (y, x) so the
    # policy can encode HQ-corner priors. extra_conv lifts the
    # receptive field past 8x8 in one CNN pass.
    features_extractor_class: reinforcetactics.rl.extractors.SpatialFeatureExtractor
    features_extractor_kwargs:
      features_dim: 256
      pool: masked_avg
      coord_conv: true
      extra_conv: true

eval:
  eval_freq: 50_000
  n_eval_episodes: 80

curriculum:
  stages:
    # PROBE-SIZED 2-stage ramp (500k + 500k = 1M total, ~20 eval
    # points at eval_freq=50_000). Goal: confirm the BC -> PPO
    # pipeline shows *any* upward trend before committing to a
    # multi-million-step run.
    #
    # Stage 1 bridges from the BC checkpoint into the Advanced
    # matchup via MixedBot(medium, advanced, p_hard=0.5), so half the
    # episodes give the policy achievable wins (vs Medium) and half
    # expose it to Advanced. Run 20260524_163828 showed BC -> Advanced
    # cold stalls at 0% WR for 750k steps with reward std 0.0 -- zero
    # learning signal. The bridge stage exists to fix that: even a
    # partial-success rate vs MixedBot gives PPO non-zero reward
    # variance to learn from, and the Advanced-half of the
    # distribution starts shaping the policy toward the actual target.
    #
    # Stage 2 is the pure target. By the time we reach it the policy
    # has already seen ~250k Advanced-half episodes via the bridge,
    # so the transition is much smaller than BC -> Advanced direct.
    #
    # Promotion gates are loose for the probe: if either stage clears,
    # great -- but the primary signal is "WR moves off zero" rather
    # than "promotes to next stage." Raise to ~10M total and tighten
    # gates once the upward-trend signature is confirmed.
    - name: skirmish_mixed_medium_advanced
      map_file: maps/1v1/skirmish.csv
      opponent: mixed
      opponent_kwargs:
        easy: medium
        hard: advanced
        p_hard: 0.5
      promotion_win_rate: 0.55
      patience: 3
      max_timesteps: 500_000
      n_eval_episodes: 80
      max_turns: 100
      ent_coef:
        start: 0.10
        end: 0.03
        schedule: linear

    - name: skirmish_advanced
      map_file: maps/1v1/skirmish.csv
      opponent: advanced
      # Lower gate than the bridge stage: vs pure Advanced, 50% WR is
      # already a meaningful target for the probe. The production run
      # can tighten this back to 0.60+ once the pipeline is proven.
      promotion_win_rate: 0.50
      patience: 3
      max_timesteps: 500_000
      n_eval_episodes: 80
      max_turns: 100
      # Cooler entropy than stage 1: by this point the policy should
      # be exploiting Advanced-specific patterns it learned during
      # the bridge, not exploring broadly.
      ent_coef:
        start: 0.05
        end: 0.01
        schedule: linear
