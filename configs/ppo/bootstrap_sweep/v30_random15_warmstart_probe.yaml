# Variation: v30_random15_warmstart_probe
# =================================================================
# DISCRIMINATOR PROBE: is beginner_random_15 a curriculum-drift /
# attractor problem, or a modern-code regression?
#
# CONTEXT (docs/bootstrap_lessons_learned.md):
#   beginner_random_15 is configured IDENTICALLY to the 6eb0566
#   deep run that cleared it in ~50k steps (promo 0.70, patience 2,
#   max_turns 100, max_actions 15, 3M budget) -- yet v28 (max_turns
#   75) and v29 (max_turns 100, deep economy pinned, reward-fixed)
#   both STALL: WR spikes to 0.94 then catastrophically collapses
#   to ~0% (W/L/D 0/0/80) and never recovers. Economy, reward,
#   roster, turn cap, gates, opponent, budget are ALL controlled
#   and equal to the run that worked. The only surviving difference
#   is the 0.2.5 -> 0.2.7 CODE PATH (two different curriculum paths
#   -- v28 33-stage, v29 6-stage -- stall identically, so the path
#   is not the differentiator).
#
# DESIGN: single-stage beginner_random_15, warm-started from v29's
#   PEAK beginner_random_10 checkpoint (96.25% WR best_model.zip).
#   Identical env/ppo/reward/engine_overrides to v29 so the policy
#   spaces match exactly (set_parameters exact_match=True). This
#   removes the entire prior curriculum as a variable: it starts
#   random_15 from a known-strong policy on MODERN code.
#
#   warm_start_path points at v29's checkpoint on the Colab Drive
#   (run 20260517_203633). VERIFY THIS PATH EXISTS before running
#   -- bootstrap raises FileNotFoundError if not (fails loud, no
#   silent cold start). Adjust if your Drive layout differs.
#
# DECISION (binary):
#   random_15 HOLDS/clears  -> NOT a code regression. The wall was
#     curriculum-drift / weak entry policy; the production fix is
#     warm-starting random_15 (and likely later random_N stages)
#     from the prior stage's best checkpoint. This is also the
#     technique needed for roster expansion later.
#   random_15 COLLAPSES from the 96% start -> conclusively a
#     0.2.5->0.2.7 CODE regression in random_15 dynamics
#     (RandomBot max_actions=15 / masking / obs). Endgame: narrow
#     forward-port bisect onto 6eb0566 with economy+reward pinned
#     via engine_overrides (now reliable).
#
# Run: modern HEAD notebook, CONFIG_PATH -> this file, Run All.
# ~0.3-1.5M steps to verdict (a warm-started strong policy either
# promotes fast or visibly collapses within a few hundred k).
# =================================================================
#
warm_start_path: /content/drive/MyDrive/reinforce-tactics/benchmarks/bootstrap/20260517_203633/beginner_random_10/best_model.zip

env:
  # 8 envs leaves headroom on a 12-vCPU machine for the main process
  # (PPO update + eval) without contention. SubprocVecEnv is required
  # for real CPU parallelism with n_envs > 1.
  n_envs: 8
  use_subprocess: true
  # max_steps is uniform across stages: 3000 is well above any
  # realistic game length (max_turns=120 * ~20 env-steps/turn ~ 2400)
  # so truncation never fires under normal play. Per-stage max_turns
  # still varies (20 / 60 / 120) to bound the natural game-clock.
  max_steps: 3000
  max_turns: 20
  # Per-game-turn hard cap on agent actions. When the policy has taken
  # this many actions in a single game-turn without ending the turn,
  # the action mask narrows to end_turn-only on subsequent steps,
  # forcing the turn to close. Bounded blast-radius defense against
  # the "never end the turn" attractor that re-emerges as max_steps
  # is raised (eval signature: ``len`` near ``max_steps`` with
  # ``turns`` very low).
  #
  # Disabled (``null``) for now so the per-stage stall traces
  # (``<stage_dir>/traces/eval_*/episode_*_max_steps_truncate.jsonl``)
  # capture the unmodified policy behaviour. Once the loop mechanism
  # is identified from the traces, set this back to 60 to enforce the
  # cap -- 60 actions/turn comfortably covers a healthy turn on the
  # beginner map (~25 legal actions worst-case for the current
  # enabled_units roster) without clipping legitimate play.
  max_actions_per_turn: null
  action_space_type: flat_discrete
  # v24: restrict to the 5-unit roster used by every deep-progressing
  # run. The all-time-best run (20260511_132922) reached skirmish_simple
  # (17 stages) with exactly this roster + turn_penalty=-0.2 + the
  # rt-0.2.5 engine economy. Warrior, Mage, Cleric, Archer, Knight.
  # Rogue/Sorcerer/Barbarian are dropped: the corrected roster scan
  # showed no deep run ever used the full 8-unit set, and every ALL-8
  # run stalled at random_10/15.
  enabled_units: [W, M, C, A, K]
  # Deep-run economy + unit stats, pinned in-config (no constants.py
  # git pin). Byte-faithful to commit 6eb0566's constants.py. The
  # full [W,M,C,A,K] stat block is pinned (not just drifted fields)
  # so this stays faithful even if constants.py drifts further;
  # GameState resolves this overlay and config.json records the
  # effective values + engine_constants_hash for audit.
  engine_overrides:
    starting_gold: 250
    headquarters_income: 150
    building_income: 100
    tower_income: 50
    unit_data:
      W: {cost: 200, health: 15, attack: 10, defence: 6, movement: 3}
      M: {cost: 300, health: 10, attack: {adjacent: 8, range: 12}, defence: 4, movement: 2}
      C: {cost: 200, health: 10, attack: 2, defence: 4, movement: 3}
      A: {cost: 250, health: 15, attack: 5, defence: 1, movement: 3}
      K: {cost: 350, health: 18, attack: 8, defence: 5, movement: 4}
  reward_config:
    # All reward magnitudes that were calibrated *relative to* the old
    # ~5000-scale terminal rewards are scaled to 1/100 of their original
    # values: terminals, captures, seize_progress, plus the per-turn
    # and per-invalid-action penalties. Prior runs showed value_loss
    # climbing without bound and explained_variance pinned near zero,
    # the canonical signature of value targets outpacing a [256,256]
    # MLP's capacity. Ratios between scaled keys are preserved (a
    # uniform divide), so the curriculum's inductive biases (building >
    # HQ > tower; terminal >> shaping; ~1% turn-penalty pressure
    # relative to a win) carry over unchanged.
    #
    # The per-step potential-shaping signals (income_diff, unit_diff,
    # structure_control) are pinned to the env defaults at gym_env.py:188-190.
    # They feed a potential function (gym_env.py:890) that is
    # policy-invariant under discounted return, but the *undiscounted*
    # eval reward sum carries a bias term -(1-gamma) * sum_t Phi(s_t)
    # that scales with episode length * average Phi. On long beginner
    # episodes (~800 steps) the prior weights (income_diff: 0.5,
    # unit_diff: 1.0, structure_control: 10.0) made avg Phi ~33,
    # biasing eval reward by ~-260 even on 100% WR runs. The env
    # defaults give avg Phi ~3, cutting the bias 10x while leaving
    # the policy's optimum unchanged: shaping invariance holds under
    # discounted return regardless of weight.
    #
    # win_by_hq_capture and win_by_elimination are equalised at 50
    # rather than the old 5:1 ratio favouring HQ. On the bigger
    # beginner map HQ capture is structurally harder than elimination
    # (more terrain, more units to fight through to reach the HQ), so
    # over-rewarding HQ pushes the policy toward an unattainable
    # strategy. Equalising lets the policy take whichever finishing
    # path the map affords.
    win_by_hq_capture: 50.0
    win_by_elimination: 50.0
    win: 50.0
    loss: -50.0
    draw: -50.0
    income_diff: 0.05
    unit_diff: 0.3
    structure_control: 1.0
    create_unit: 0.0
    move: 0.0
    damage_scale: 0.0
    kill: 0.0
    seize_progress: 3.0
    capture: 10.0            # back-compat fallback (no longer reached
                             # when the per-type keys below are set)
    # Per-structure capture differentiation. Hoisted to the global env
    # config (rather than scoped to a single late stage) so every stage
    # in the curriculum sees the same gradient: building captures are
    # the highest per-turn payoff, HQ captures are a viable finisher,
    # and neutral towers are positive-but-not-dominant. Rationale:
    # introducing a new strategy mid-curriculum (only at random_20)
    # asks the policy to discover and integrate it after entropy has
    # already cooled to 0.03 and the value function has locked in on
    # the warrior-spam-elimination attractor from earlier stages. Far
    # easier to bake in the correct inductive bias from stage 1, when
    # entropy is high and the value function is plastic. Both starter
    # and beginner maps have HQs, buildings, and towers in equivalent
    # layouts, so the gradient is meaningful on every stage.
    tower_capture: 15.0      # neutral towers; modest downweight on the
                             # local optimum the prior run converged to
    building_capture: 40.0   # enemy economy; ~20.5/turn vs tower 8/turn
                             # makes this the per-turn-best capture target
    hq_capture: 25.0         # stacks with win_by_hq_capture (+50) so
                             # HQ seize pays ~18.75/turn including terminal
    cure: 0.0
    heal_scale: 0.0
    paralyze: 0.0
    haste: 0.0
    defence_buff: 0.0
    attack_buff: 0.0
    invalid_action: -0.1
    # ``turn_penalty`` is -0.5 in v16. Prior runs charged a per-end_turn
    # cost which (combined with seize_progress and free move/attack
    # actions) trained the policy into a "never end the turn" attractor
    # -- episodes truncated at ``max_steps`` with very few game-turns
    # elapsed and 0% win rate. That objection no longer applies here
    # because the v16 environment enforces a hard ``max_turns: 75`` cap
    # on every beginner+ stage (env truncates the game at the cap), so
    # the agent cannot stretch turns indefinitely to avoid the penalty.
    # Re-enabling turn_penalty is the v16 response to the
    # draw-with-shaping equilibrium diagnosed in run 20260513_033055:
    # without per-turn pressure the value function correctly estimates
    # ~+45 expected return from drawing and the policy commits to it.
    # See file header for the reward arithmetic.
    #
    # v24: -0.2 (was v16's -0.5). The deep-progressing runs used
    # -0.2 (rt 0.2.5) or 0.0 (the May-12 bootstrap runs that cleared
    # random_15 at 100%). v16's -0.5 co-occurred with the ALL-8 roster
    # switch and the engine economy change; every -0.5 run stalled.
    # -0.2 is the value from the 17-stage 20260511_132922 run.
    turn_penalty: -0.2
    # ``win_speed_bonus`` adds up to this magnitude on a turn-1 win
    # and tapers linearly to 0 at ``max_turns``. With ``win=50`` the
    # terminal range becomes 50..100 depending on speed, so the
    # agent gets a clear gradient toward faster wins without paying
    # a per-action or per-end_turn cost mid-game. Stacks with the
    # ``win`` / ``win_by_*`` terminals; only fires on the agent's
    # win.
    win_speed_bonus: 0.0
    # Opponent-capture penalty. Fires once per capturable tile the
    # opponent seizes during their turn (gym_env.py:_execute_action,
    # action_type=5). Tiered to encode two different failures:
    # ``enemy_neutral_capture`` punishes letting the opponent grab a
    # contested neutral (the failure that collapsed skirmish_simple --
    # the agent never learned the capture race because beginner has 0
    # neutrals and random opponents don't compete for them).
    # ``enemy_owned_capture`` punishes losing a tile we already held;
    # the structure_control shaping already gives a small differential
    # signal here, but the discrete event reward sharpens it. Magnitudes
    # are calibrated against building_capture=+40 so re-capturing
    # remains net-positive even after eating both penalties.
    enemy_neutral_capture: 0.0
    enemy_owned_capture: 0.0
ppo:
  learning_rate: 3.0e-4
  n_steps: 2048             # 2048 * 8 = 16384 transitions per PPO update
  batch_size: 256           # bumped from 64 -- L4 absorbs much bigger minibatches
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.05
  vf_coef: 0.5
  max_grad_norm: 0.5
  policy_kwargs:
    net_arch:
      pi: [256, 256]
      vf: [256, 256]
    # CNN trunk over the (grid, units) spatial planes. Without this SB3's
    # default ``CombinedExtractor`` flattens both planes — the policy
    # then has to relearn map adjacency from a flat vector and pays a
    # large parameter cost on the first Linear layer (input grows with
    # H * W * channels). ``pool: masked_avg`` makes the trunk's output
    # size independent of ``pad_to_size`` *and* skips padded cells in
    # the spatial average, which matters because early-curriculum stages
    # train on 6x6 maps padded up to (10, 12) — under plain ``avg`` the
    # global average pool would be ~70% zero-padding noise on those
    # stages. ``coord_conv`` prepends two normalized (y, x) channels so
    # the policy can reason about absolute position (HQ corner, etc.)
    # without spending conv capacity rediscovering it. ``extra_conv``
    # adds a 4th 3x3 conv block, lifting the receptive field from ~7x7
    # to ~9x9 — most of corner_points (10x12) in one CNN look.
    features_extractor_class: reinforcetactics.rl.extractors.SpatialFeatureExtractor
    features_extractor_kwargs:
      features_dim: 256
      pool: masked_avg
      coord_conv: true
      extra_conv: true

eval:
  # eval_freq is in env steps across all sub-envs. With n_envs=8 and
  # n_steps=2048, one PPO update = 16384 env steps, so eval_freq=50000
  # fires ~once per 3 PPO updates -- the efficient ratio for production
  # runs. (20000 was used during the reward-rescale validation runs to
  # catch value-head / reward-signal regressions early; once those were
  # confirmed healthy the eval overhead at that cadence -- ~half of
  # wall-clock -- stopped being worth it.) Per-stage
  # CurriculumStage.n_eval_episodes overrides this default for stages
  # that need tighter CIs.
  eval_freq: 50_000
  n_eval_episodes: 80

curriculum:
  stages:
    - name: beginner_random_15
      map_file: maps/1v1/beginner.csv
      opponent: random
      opponent_kwargs:
        max_actions: 15
      promotion_win_rate: 0.70
      patience: 2
      max_timesteps: 1_500_000
      n_eval_episodes: 80
      max_turns: 100
      ent_coef:
        start: 0.10
        end: 0.03
        schedule: linear
